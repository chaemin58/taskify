name: CI Check

on:
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # 프로젝트 노드 버전 확인
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Lint Check
        run: npm run lint # 프로젝트에 설정된 린트 명령어

      - name: Build
        run: npm run build # 빌드 성공 여부 확인